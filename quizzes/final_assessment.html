<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Assessment — Day 1: Practical AI for Oil & Gas</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #6D2E46 0%, #A4133C 100%);
    min-height: 100vh;
    padding: 30px 16px;
    color: #1a1a1a;
  }
  .container { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.2); overflow: hidden; }
  header { background: #6D2E46; color: #fff; padding: 28px 32px; }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .badge { display: inline-block; background: rgba(255,255,255,0.18); color: #fff; padding: 3px 10px; border-radius: 999px; font-size: 12px; margin-left: 8px; letter-spacing: 0.4px; }
  .main { padding: 28px 32px; }
  .progress-bar { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { background: #A4133C; height: 100%; width: 0%; transition: width 0.4s ease; }
  .question { display: none; animation: fadeIn 0.4s ease; }
  .question.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: flex; justify-content: space-between; }
  .q-cat { color: #A4133C; font-weight: 600; }
  .q-text { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; color: #111; }
  .q-scenario { background: #fef3f2; padding: 12px 16px; border-left: 4px solid #A4133C; border-radius: 0 6px 6px 0; margin: 12px 0 18px; font-size: 14px; color: #374151; }
  .options { margin: 0; padding: 0; list-style: none; }
  .option {
    background: #fff; border: 2px solid #e5e7eb; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
    transition: all 0.18s ease; font-size: 15px; line-height: 1.45; user-select: none;
  }
  .option:hover { border-color: #A4133C; background: #fef3f2; }
  .option.selected { border-color: #A4133C; background: #fee2e2; }
  .option.correct { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .option.wrong { border-color: #dc2626; background: #fee2e2; cursor: default; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button {
    background: #6D2E46; color: #fff; border: 0;
    padding: 11px 22px; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease;
  }
  button:hover:not(:disabled) { background: #A4133C; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results { text-align: center; padding: 30px 20px; display: none; }
  .results.show { display: block; }
  .score-circle {
    width: 160px; height: 160px; border-radius: 50%;
    background: linear-gradient(135deg, #6D2E46, #A4133C);
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 28px rgba(109,46,70,0.35);
  }
  .score-circle .pct { font-size: 40px; font-weight: 700; }
  .score-circle .frac { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; max-width: 580px; margin-left: auto; margin-right: auto; }
  .cert-banner {
    display: inline-block;
    background: linear-gradient(135deg, #FEF3C7, #FDE68A);
    color: #78350F;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    margin: 12px 0;
    border: 1px solid #FCD34D;
  }
  .cat-breakdown { background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin: 18px 0; text-align: left; }
  .cat-breakdown h3 { margin: 0 0 12px 0; font-size: 15px; color: #374151; }
  .cat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
  .cat-row:last-child { border-bottom: 0; }
  .cat-row strong { color: #6D2E46; }
  .review { text-align: left; background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin-top: 18px; font-size: 14px; }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item { padding: 8px 0; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 10px; }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
  .review-cat { color: #9ca3af; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Final Assessment <span class="badge">Day 1</span></h1>
    <p>15 questions across all modules · Aim for 80%+ to demonstrate proficiency</p>
  </header>

  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div id="quiz"></div>
    <div class="results" id="results">
      <div class="score-circle">
        <div class="pct" id="scorePct">0%</div>
        <div class="frac" id="scoreFrac">0 / 15</div>
      </div>
      <h2 id="verdictTitle">Assessment Complete</h2>
      <div class="verdict" id="verdictText"></div>
      <div id="certBanner"></div>
      <div class="cat-breakdown">
        <h3>By Topic</h3>
        <div id="catBreakdown"></div>
      </div>
      <div class="review">
        <h3>Question Review</h3>
        <div id="reviewList"></div>
      </div>
      <button onclick="restart()" style="margin-top: 20px;">Retake Assessment</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    category: "Red List / PECA",
    q: "An engineer at a Pakistani state-owned operator pastes a draft JV agreement (with a foreign partner) into ChatGPT to analyse risks. The data is on US-based servers. Which is the BIGGEST concern?",
    options: [
      "ChatGPT might charge a fee.",
      "PECA 2016 §3/§4/§14 may apply — unauthorised disclosure of state-owned strategic data to foreign-hosted services can attract criminal liability.",
      "The AI's reply might take too long.",
      "The colour of the chat interface."
    ],
    correct: 1,
    explain: "PECA 2016 makes unauthorised disclosure of state-owned strategic data on foreign servers a serious legal risk. Always anonymise; for live JV documents, NotebookLM with a private account or in-tenant Copilot are safer."
  },
  {
    category: "Tool Selection",
    q: "You need to compare a 90-page tender pack against a competitor's 80-page submission. Free tier only. Which tool to start with?",
    options: [
      "ChatGPT free.",
      "Claude free — larger context window on the free tier, generally more rigorous about citing.",
      "MS Paint.",
      "WhatsApp."
    ],
    correct: 1,
    explain: "For long-document comparison, Claude's free tier handles the volume more reliably and tends to cite specific clauses. For regulator-grade analysis, NotebookLM is even safer (cites every page)."
  },
  {
    category: "Prompt Engineering",
    q: "Which is the most powerful single instruction to add to ANY prompt where accuracy matters?",
    options: [
      "Please be polite.",
      "Use lots of emojis.",
      "Do not invent any names, dates, quantities, regulations, or facts not in my input. Use [PLACEHOLDERS] for missing data. Mark uncertain claims with verify reference.",
      "Make it long."
    ],
    correct: 2,
    explain: "The universal anti-hallucination block is the single highest-value addition to any prompt that produces a document for filing, sharing, or audit."
  },
  {
    category: "Copilot",
    q: "Your team is about to discuss a confidential vendor BAFO in a Teams meeting. Should Copilot transcription be enabled?",
    options: [
      "Yes — always.",
      "Only if the GM says so verbally.",
      "Be very cautious. The transcript is data subject to your tenant's residency policy. For BAFO/JV/pre-disclosure incidents, get legal/IT sign-off first.",
      "Only if the meeting is short."
    ],
    correct: 2,
    explain: "Transcripts live in your tenant region (often UAE/Singapore for Pakistani enterprises). For sensitive negotiations and pre-disclosure incidents, the policy must be settled before enabling transcription."
  },
  {
    category: "Hallucination",
    q: "ChatGPT confidently tells you OGRA Section 26 requires disclosure within 12 hours. What do you do?",
    options: [
      "Quote it in the OGRA filing.",
      "Take a screenshot and post on LinkedIn.",
      "Open ogra.org.pk and verify the section, the timeframe, and the exact wording before quoting anything. AI-cited regulations must always be verified on the source.",
      "Ask the same question 10 more times until you believe it."
    ],
    correct: 2,
    explain: "Confident, specific citations are the most dangerous AI outputs. Always verify regulatory citations on the original source (ogra.org.pk, ppra.org.pk, gazette notifications). Hallucinated section numbers are common."
  },
  {
    category: "Tool Selection",
    q: "You need to know yesterday's OGRA gas tariff notification. Which is the right tool?",
    options: [
      "ChatGPT — it knows everything.",
      "Claude — it has the largest brain.",
      "Perplexity — it searches the live internet and cites sources. ChatGPT and Claude have training cutoffs and don't reliably know recent events.",
      "WhatsApp forwards."
    ],
    correct: 2,
    explain: "ChatGPT and Claude don't reliably know post-training events. Perplexity does live web search with citations and is the right tool for 'what's the latest…'. For regulatory specifics, also cross-check on ogra.org.pk."
  },
  {
    category: "Prompt Engineering",
    q: "Your colleague writes: 'Help me with this incident report.' The output is generic. What is missing from their prompt?",
    options: [
      "Nothing — the AI is just lazy.",
      "Role and Context. They should specify 'You are an HSE Investigator at a Pakistani downstream operator' and provide the facts of the incident.",
      "More emojis.",
      "A 'please'."
    ],
    correct: 1,
    explain: "Generic input produces generic output. Role and Context do most of the heavy lifting — they tell the AI which 'mode' of writing to adopt and which facts to anchor to."
  },
  {
    category: "Red List / Anonymisation",
    q: "Which of these inputs is SAFE to paste into a public AI?",
    options: [
      "Anonymised production from a [REGION] field is dropping 8% MoM — possible causes?",
      "Live BHP/WHP figures for [WELL-X] in our [FIELD-Y] block.",
      "A confidential JV agreement with [SPECIFIC FOREIGN COMPANY].",
      "An internal HSE incident report from yesterday, before OGRA disclosure."
    ],
    correct: 0,
    explain: "Option A is properly anonymised — concept-level question with placeholders. The other three are all Red List: live production data, live commercial contracts, and pre-disclosure incidents."
  },
  {
    category: "Copilot",
    q: "The biggest difference between Microsoft Copilot and public AI (ChatGPT/Claude) for Pakistani O&G work is:",
    options: [
      "Copilot is cheaper.",
      "Copilot lives inside Outlook/Word/Excel/Teams and has access to your own emails, documents and meetings — different threat model. The power AND the risk both come from data integration.",
      "Copilot only works in summer.",
      "Copilot writes better poetry."
    ],
    correct: 1,
    explain: "Integration is the defining feature — Copilot reads your real emails, docs, calendar. That's its power. It's also why data residency matters: confirm with IT before any rollout for sensitive sectors."
  },
  {
    category: "Engineering Use",
    q: "Can you trust AI for an exact NPSH calculation on a centrifugal pump?",
    options: [
      "Yes — AI is fully qualified.",
      "Use AI to sanity-check the APPROACH and identify common conceptual mistakes; use calculator/engineering software for exact numbers. AI doesn't 'calculate' — it predicts text.",
      "No — never use AI for engineering.",
      "Only on Tuesdays."
    ],
    correct: 1,
    explain: "AI is a thinking partner: excellent for structured reasoning, order-of-magnitude checks, blind-spot spotting. Unreliable for exact numeric calculation. Use it for the method, not the final number."
  },
  {
    category: "Prompt Engineering",
    q: "Which line is best added to a prompt for a regulator-facing letter?",
    options: [
      "Make it sound exciting.",
      "Third-person, formal, regulator-facing register. No first-person pronouns. British English. Do not cite specific regulation section numbers unless provided.",
      "Use slang.",
      "Add lots of exclamation marks."
    ],
    correct: 1,
    explain: "Regulator-facing documents need formal register (third person), British English (standard for Pakistani docs), and an explicit instruction not to fabricate regulatory citations. This single line transforms output quality."
  },
  {
    category: "Procurement",
    q: "Why is procurement data particularly risky to paste into public AI even when anonymised?",
    options: [
      "It isn't — anonymisation always solves the problem.",
      "The combination of clauses, vendor profiles, scope and your context can fingerprint a specific deal even when individual data points have placeholders.",
      "Procurement data is boring.",
      "AI tools refuse procurement questions."
    ],
    correct: 1,
    explain: "Fingerprinting is the procurement-specific risk. A clever competitor (or anyone with access to your prompt logs) can often identify the deal from context alone. Use Copilot in-tenant where possible; for public AI, anonymise aggressively and avoid live BAFO data entirely."
  },
  {
    category: "5-Part Anatomy",
    q: "Match the prompt fragment to the right part of the 5-Part Anatomy: 'You are a Senior HSE Manager at a Pakistani refinery.'",
    options: [
      "Task",
      "Role",
      "Format",
      "Limits"
    ],
    correct: 1,
    explain: "'You are a [WHO]…' is the Role — the persona you want the AI to adopt. Role + Context together do most of the work in shaping useful output."
  },
  {
    category: "Sign-off Discipline",
    q: "AI drafts an OGRA Section 26 disclosure for your incident. The four-step sign-off discipline is:",
    options: [
      "Email it. Done.",
      "1) Author check — read every line, verify every name. 2) Source check — verify every cited regulation. 3) Audience check — is it courtroom-ready? 4) Manual signature — your name, your accountability.",
      "Have an intern read it.",
      "Translate it five times until it sounds right."
    ],
    correct: 1,
    explain: "The four-step sign-off is non-negotiable for any AI-drafted document going to a regulator, court, or external audience. AI cannot be liable. You can. Sign deliberately."
  },
  {
    category: "Capstone",
    q: "Your master prompt should have which of the following properties to be genuinely reusable for 2+ hours per week of time-saving?",
    options: [
      "Vague and short, so it works on any topic.",
      "Specific (5-Part Anatomy complete) · Includes negative constraints · Includes anti-hallucination clause · Tested on at least one anonymised real case · Easy to copy/paste from your saved location.",
      "Memorised, never written down.",
      "Only used on Fridays."
    ],
    correct: 1,
    explain: "Reusable master prompts share these features: specific (all 5 parts), negative constraints (what NOT to do), anti-hallucination clause, tested, and saved somewhere accessible. The 30 minutes you spend perfecting yours today pay back every week for years."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');

function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;
  quizEl.innerHTML = `
    <div class="question active">
      <div class="q-meta">
        <span>Question ${current + 1} of ${questions.length}</span>
        <span class="q-cat">${q.category}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <ul class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          } else if (selected === i) cls += ' selected';
          return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
        }).join('')}
      </ul>
      ${answered ? `
        <div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show">
          <strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>
          ${q.explain}
        </div>` : ''}
      <div class="nav">
        <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
        <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'Submit Assessment →' : 'Next →'}</button>
      </div>
    </div>`;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}

function pick(i) { if (answers[current] !== null) return; answers[current] = i; render(); }
function next() { if (answers[current] === null) return; current++; if (current >= questions.length) showResults(); else render(); }
function prev() { if (current > 0) { current--; render(); } }

function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;

  let verdict, cert = '';
  if (pct >= 90) {
    verdict = "Exceptional — you have a comprehensive grasp of Day 1 material. You are equipped to deploy AI safely and effectively in your role.";
    cert = '<div class="cert-banner">🏆 Day 1 Distinction · Proficient</div>';
  } else if (pct >= 80) {
    verdict = "Strong — you have a working command of the material. Review the explanations on missed questions and you'll be set.";
    cert = '<div class="cert-banner">✅ Day 1 Pass · Competent</div>';
  } else if (pct >= 60) {
    verdict = "Solid foundation but more practice needed. Re-read the modules covering your missed questions, then retake.";
  } else {
    verdict = "Worth a careful re-read of the modules before applying anything in real work. Particular attention to Red List, hallucination patterns, and the 5-Part Anatomy.";
  }
  document.getElementById('verdictText').textContent = verdict;
  document.getElementById('certBanner').innerHTML = cert;

  const catScores = {};
  questions.forEach((q, i) => {
    if (!catScores[q.category]) catScores[q.category] = { correct: 0, total: 0 };
    catScores[q.category].total++;
    if (answers[i] === q.correct) catScores[q.category].correct++;
  });
  document.getElementById('catBreakdown').innerHTML = Object.entries(catScores).map(([cat, s]) => 
    `<div class="cat-row"><span>${cat}</span><strong>${s.correct} / ${s.total}</strong></div>`
  ).join('');

  document.getElementById('reviewList').innerHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item">
      <span class="review-mark">${ok ? '✓' : '✗'}</span>
      <div>
        <div class="review-cat">${q.category}</div>
        <strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}
      </div>
    </div>`;
  }).join('');
  barEl.style.width = '100%';
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  quizEl.style.display = 'block';
  resultsEl.classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
