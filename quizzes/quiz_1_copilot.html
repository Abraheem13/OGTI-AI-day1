<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 1 — Microsoft Copilot for Oil & Gas</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #065A82 0%, #1C7293 100%);
    min-height: 100vh;
    padding: 30px 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  header {
    background: #065A82;
    color: #fff;
    padding: 28px 32px;
  }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .main { padding: 28px 32px; }
  .progress-bar {
    background: #e5e7eb;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    background: #21295C;
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }
  .question {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .question.active { display: block; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    color: #6b7280;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 6px 0;
    color: #111;
  }
  .q-scenario {
    background: #f3f4f6;
    padding: 12px 16px;
    border-left: 4px solid #1C7293;
    border-radius: 0 6px 6px 0;
    margin: 12px 0 18px;
    font-size: 14px;
    color: #374151;
  }
  .options { margin: 0; padding: 0; list-style: none; }
  .option {
    background: #fff;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 15px;
    line-height: 1.45;
    user-select: none;
  }
  .option:hover { border-color: #1C7293; background: #f0f9ff; }
  .option.selected { border-color: #1C7293; background: #e0f2fe; }
  .option.correct {
    border-color: #16a34a;
    background: #dcfce7;
    cursor: default;
  }
  .option.wrong {
    border-color: #dc2626;
    background: #fee2e2;
    cursor: default;
  }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback {
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.55;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
  }
  button {
    background: #21295C;
    color: #fff;
    border: 0;
    padding: 11px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  button:hover:not(:disabled) { background: #065A82; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results {
    text-align: center;
    padding: 30px 20px;
    display: none;
  }
  .results.show { display: block; }
  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(135deg, #065A82, #1C7293);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(6,90,130,0.3);
  }
  .score-circle .pct { font-size: 36px; font-weight: 700; }
  .score-circle .frac { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; }
  .review {
    text-align: left;
    background: #f9fafb;
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 18px;
    font-size: 14px;
  }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item {
    padding: 8px 0;
    border-bottom: 1px solid #e5e7eb;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Quiz 1 — Microsoft Copilot for Oil &amp; Gas</h1>
    <p>10 questions · Tests your understanding of Module 01 · No time limit</p>
  </header>

  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>

    <div id="quiz"></div>

    <div class="results" id="results">
      <div class="score-circle">
        <div class="pct" id="scorePct">0%</div>
        <div class="frac" id="scoreFrac">0 / 10</div>
      </div>
      <h2 id="verdictTitle">Well done</h2>
      <div class="verdict" id="verdictText"></div>
      <div class="review">
        <h3>Question Review</h3>
        <div id="reviewList"></div>
      </div>
      <button onclick="restart()" style="margin-top: 20px;">Try Again</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "You receive an email thread of 14 messages about a pipeline-delay issue. You have 3 minutes before your GM meeting. What is the BEST first prompt to give Copilot in Outlook?",
    options: [
      "Reply to the most recent email.",
      "Summarise this thread for my GM. Highlight the original problem, decisions taken (and by whom), what's outstanding, and the current bottleneck. Keep under 120 words.",
      "Translate this thread into Urdu.",
      "Delete all the older emails and keep only the latest one."
    ],
    correct: 1,
    explain: "Option B is a complete 5-Part Anatomy prompt (Role implicit, Context = brief for GM, Task = summarise, Format = 4 specific points, Limits = under 120 words). The other options either don't use Copilot's strength (A, D) or solve the wrong problem (C)."
  },
  {
    q: "Microsoft Copilot has access to your emails, documents, calendar, and Teams transcripts. What is the SINGLE biggest implication of this for Pakistani O&G operators?",
    options: [
      "Copilot is faster than ChatGPT.",
      "Copilot can replace your IT department.",
      "Copilot's power AND risk both come from data integration — including data residency questions for sensitive sectors.",
      "Copilot only works on Windows computers."
    ],
    correct: 2,
    explain: "The integration is the defining feature — it's what makes Copilot more powerful than public AI for internal work, AND why data residency (UAE/Singapore tenants) matters for Pakistani regulated operators. Always confirm with IT before rollout."
  },
  {
    q: "You ask Copilot to extract action items from a long email thread. It returns a beautifully formatted table with names, tasks, and deadlines. What is your NEXT step before forwarding to your team?",
    options: [
      "Forward immediately — Copilot is reliable.",
      "Read every row and verify each deadline is actually mentioned in the thread; Copilot occasionally invents reasonable-sounding deadlines.",
      "Add emojis to make it friendlier.",
      "Delete the original thread to save storage."
    ],
    correct: 1,
    explain: "Copilot is good but not perfect. The most common failure mode is inventing deadlines that look reasonable but were never in the original. Always verify before forwarding action items."
  },
  {
    q: "What is the approximate cost of Microsoft 365 Copilot per user per month, and what licence does it require?",
    options: [
      "Free with any Microsoft account.",
      "$5/user/month with a basic M365 licence.",
      "Approximately $30/user/month as an E3 or E5 add-on.",
      "$200/user/month, enterprise-only."
    ],
    correct: 2,
    explain: "Copilot for M365 is an add-on (~$30/user/month) on top of E3 or E5 licences. Your IT team controls provisioning. Most Pakistani enterprises have tenant data residency in UAE or Singapore."
  },
  {
    q: "You are using Copilot in Word to convert raw HSE field notes into a 2-page formal report. The notes are anonymised. What is the MOST important constraint to include in your prompt?",
    options: [
      "Make it as long as possible.",
      "Use British English; do not invent names, dates, or quantities — use placeholders like [NAME], [DATE] where data is missing.",
      "Add lots of emojis to make it engaging.",
      "Write it as a screenplay."
    ],
    correct: 1,
    explain: "The anti-hallucination constraint (no invented facts; use placeholders) is non-negotiable for any document that might be filed, audited, or shared externally. British English is the standard for Pakistani O&G documentation."
  },
  {
    q: "In Excel, Copilot helps you find anomalies in well production data. You ask it 'which three wells deserve immediate investigation?' It gives you three names with confident percentage-change figures. What should you do?",
    options: [
      "Trust the numbers completely — Excel is precise.",
      "Spot-check the percentages on at least one row by manual calculation; Copilot is good at triage but can round inconsistently.",
      "Email the three well names to the GM immediately.",
      "Print the analysis and frame it on the office wall."
    ],
    correct: 1,
    explain: "Treat Copilot's data analysis as TRIAGE, not DIAGNOSIS. Spot-check at least one row of calculation before trusting the conclusion. It's pattern recognition, not reservoir engineering."
  },
  {
    q: "Copilot in Teams can produce a meeting recap with decisions attributed to specific named attendees. When is this MOST likely to be inaccurate?",
    options: [
      "When the meeting is short.",
      "When two people speak over each other or when audio quality is poor — speaker identification can mis-attribute statements.",
      "When the meeting is held in Urdu.",
      "It is never inaccurate."
    ],
    correct: 1,
    explain: "Speaker identification works well with clear audio and one person speaking at a time. Cross-talk, poor microphones, or speakerphone setups can cause mis-attribution. Always verify critical quotes against the original recording."
  },
  {
    q: "Your team is about to discuss a confidential JV negotiation in a Teams meeting. Should you enable Copilot transcription?",
    options: [
      "Yes — transcripts make everyone's life easier.",
      "Always enable it, the AI won't share anything.",
      "Be very cautious — transcripts become data subject to your tenant's data residency policy. Discuss with legal/IT before enabling for sensitive meetings.",
      "Only enable it if the meeting is over an hour long."
    ],
    correct: 2,
    explain: "Transcripts are data. They live in the tenant region (often UAE/Singapore for Pakistani enterprises). For JV negotiations, vendor selection, or pre-disclosure incidents, the legal/IT team must sign off on transcription policy first."
  },
  {
    q: "What is the right pattern for getting THREE different versions of an Executive Summary (board, crew, regulator) from the same source document?",
    options: [
      "Open three different Word documents and copy-paste manually.",
      "Write three completely separate prompts from scratch.",
      "Generate the summary once, then ask Copilot to rewrite the same content for each new audience — this is one of the highest-value uses for senior managers.",
      "Pay another colleague to write each version."
    ],
    correct: 2,
    explain: "Same facts, three audiences, three minutes — this is the canonical demonstration of Copilot's value. Generate once, then ask for rewrites for each audience. Saves hours and keeps facts consistent across versions."
  },
  {
    q: "You're a Senior Operations Manager. Which of these emails is SAFE to summarise with Copilot in Outlook?",
    options: [
      "An email containing live BHP and WHP figures for [WELL-X].",
      "A confidential JV negotiation with a foreign partner.",
      "A long email thread about an internal HSE incident that hasn't been disclosed to OGRA yet.",
      "An internal email chain about logistical arrangements for next week's offsite meeting."
    ],
    correct: 3,
    explain: "Logistical arrangements for an offsite are low-sensitivity. The other three options are firmly on the Red List: live production data, JV negotiations, and pre-disclosure incidents all carry PECA 2016 exposure. Remember: Copilot is safer than public AI for these, BUT the data still exists in your tenant region — confirm policy with IT."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');

function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;

  quizEl.innerHTML = `
    <div class="question active">
      <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      <ul class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          } else if (selected === i) {
            cls += ' selected';
          }
          return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
        }).join('')}
      </ul>
      ${answered ? `
        <div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show">
          <strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>
          ${q.explain}
        </div>
      ` : ''}
      <div class="nav">
        <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
        <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'See Results →' : 'Next →'}</button>
      </div>
    </div>
  `;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}

function pick(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  render();
}

function next() {
  if (answers[current] === null) return;
  current++;
  if (current >= questions.length) showResults();
  else render();
}

function prev() {
  if (current > 0) { current--; render(); }
}

function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;
  let verdict;
  if (pct === 100) verdict = "Perfect score — you have a strong grip on Microsoft Copilot for O&G.";
  else if (pct >= 80) verdict = "Strong performance — review the explanations for the ones you missed.";
  else if (pct >= 60) verdict = "Good start — go back and re-read Module 01 walkthroughs, then retry.";
  else verdict = "Worth a careful review of Module 01 before moving on.";
  document.getElementById('verdictText').textContent = verdict;
  const reviewHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item">
      <span class="review-mark">${ok ? '✓' : '✗'}</span>
      <div><strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('reviewList').innerHTML = reviewHTML;
  barEl.style.width = '100%';
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  quizEl.style.display = 'block';
  resultsEl.classList.remove('show');
  render();
}

render();
</script>

</body>
</html>
