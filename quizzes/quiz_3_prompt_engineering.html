<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz 3 — Prompt Engineering for Oil & Gas</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #065A82 0%, #1C7293 100%);
    min-height: 100vh;
    padding: 30px 16px;
    color: #1a1a1a;
  }
  .container { max-width: 820px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.18); overflow: hidden; }
  header { background: #065A82; color: #fff; padding: 28px 32px; }
  header h1 { margin: 0 0 6px 0; font-size: 22px; }
  header p { margin: 0; opacity: 0.85; font-size: 14px; }
  .main { padding: 28px 32px; }
  .progress-bar { background: #e5e7eb; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 28px; }
  .progress-fill { background: #21295C; height: 100%; width: 0%; transition: width 0.4s ease; }
  .question { display: none; animation: fadeIn 0.4s ease; }
  .question.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .q-text { font-size: 18px; font-weight: 600; margin: 0 0 6px 0; color: #111; }
  .q-code { background: #1f2937; color: #f3f4f6; padding: 12px 14px; border-radius: 6px; font-family: ui-monospace, "Courier New", monospace; font-size: 13px; margin: 10px 0 16px; white-space: pre-wrap; line-height: 1.45; }
  .options { margin: 0; padding: 0; list-style: none; }
  .option {
    background: #fff; border: 2px solid #e5e7eb; border-radius: 8px;
    padding: 14px 16px; margin-bottom: 10px; cursor: pointer;
    transition: all 0.18s ease; font-size: 15px; line-height: 1.45; user-select: none;
  }
  .option:hover { border-color: #1C7293; background: #f0f9ff; }
  .option.selected { border-color: #1C7293; background: #e0f2fe; }
  .option.correct { border-color: #16a34a; background: #dcfce7; cursor: default; }
  .option.wrong { border-color: #dc2626; background: #fee2e2; cursor: default; }
  .option.disabled { cursor: default; opacity: 0.7; }
  .feedback { margin-top: 14px; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.55; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
  .feedback.wrong { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; }
  button {
    background: #21295C; color: #fff; border: 0;
    padding: 11px 22px; border-radius: 6px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s ease;
  }
  button:hover:not(:disabled) { background: #065A82; transform: translateY(-1px); }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  button.secondary { background: #e5e7eb; color: #374151; }
  button.secondary:hover:not(:disabled) { background: #d1d5db; transform: translateY(-1px); }
  .results { text-align: center; padding: 30px 20px; display: none; }
  .results.show { display: block; }
  .score-circle {
    width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, #065A82, #1C7293);
    color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(6,90,130,0.3);
  }
  .score-circle .pct { font-size: 36px; font-weight: 700; }
  .score-circle .frac { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .results h2 { margin: 0 0 8px 0; color: #111; }
  .results .verdict { color: #4b5563; font-size: 15px; margin-bottom: 20px; }
  .review { text-align: left; background: #f9fafb; border-radius: 8px; padding: 16px 20px; margin-top: 18px; font-size: 14px; }
  .review h3 { margin: 0 0 10px 0; font-size: 15px; color: #374151; }
  .review-item { padding: 8px 0; border-bottom: 1px solid #e5e7eb; display: flex; align-items: flex-start; gap: 10px; }
  .review-item:last-child { border-bottom: 0; }
  .review-mark { font-size: 18px; flex-shrink: 0; line-height: 1.3; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Quiz 3 — Prompt Engineering for Oil &amp; Gas</h1>
    <p>10 questions · Tests your understanding of Module 03 · No time limit</p>
  </header>

  <div class="main">
    <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    <div id="quiz"></div>
    <div class="results" id="results">
      <div class="score-circle">
        <div class="pct" id="scorePct">0%</div>
        <div class="frac" id="scoreFrac">0 / 10</div>
      </div>
      <h2 id="verdictTitle">Well done</h2>
      <div class="verdict" id="verdictText"></div>
      <div class="review">
        <h3>Question Review</h3>
        <div id="reviewList"></div>
      </div>
      <button onclick="restart()" style="margin-top: 20px;">Try Again</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "The 5-Part Anatomy of a great prompt consists of which five elements?",
    options: [
      "Hello · Question · Please · Thank You · Goodbye",
      "Role · Context · Task · Format · Limits",
      "Verb · Noun · Adjective · Adverb · Preposition",
      "Input · Output · Process · Result · Feedback"
    ],
    correct: 1,
    explain: "Role · Context · Task · Format · Limits is the universal framework taught in this programme. Every well-structured prompt has all five. Missing any one usually produces weaker output."
  },
  {
    q: "Which prompt is BETTER for getting a usable first draft?",
    code: "A) Write me a summary of yesterday's production.\n\nB) You are a Production Engineer at a Pakistani upstream operator. Context: I'll paste raw shift data covering 24 hours of well operations.\n\nTask: produce a Morning Production Brief with:\n1. Headline (one sentence)\n2. Production summary vs target\n3. Top 3 wells of concern\n4. HSE events\n5. What I should raise at 09:00\n\nFormat: markdown, under 300 words, British English.\nConstraints: do not invent any wells or numbers; use [WELL-X] placeholder if unclear.",
    options: [
      "Prompt A — shorter is always better.",
      "Prompt B — it has all 5 parts of the anatomy: Role, Context, Task, Format, Limits.",
      "Both produce identical output.",
      "Neither — only Excel can do this."
    ],
    correct: 1,
    explain: "Prompt B is a textbook 5-Part Anatomy prompt. Specific role, clear context, defined task with structure, explicit format, and limits including an anti-hallucination clause. Prompt A leaves the AI to guess on almost everything."
  },
  {
    q: "You're asking for an OGRA Section 26 disclosure draft. Which constraint is MOST important to include?",
    options: [
      "Use lots of legal Latin terms.",
      "Make it sound friendly and approachable.",
      "Do not invent section numbers, regulations, or facts. If unsure, write 'verify reference' instead of citing a specific number.",
      "Include at least three emojis."
    ],
    correct: 2,
    explain: "AI tools regularly hallucinate plausible-sounding section numbers. For any regulatory document, the anti-hallucination clause is non-negotiable. Always verify any citation on the original source (ogra.org.pk)."
  },
  {
    q: "A junior colleague writes: 'Improve this email.' Their first draft is generic and bland. What is the most likely root cause?",
    options: [
      "The AI is broken.",
      "Missing Role and Context — without them the AI defaults to generic corporate-speak. They should specify their role, the recipient, and the desired tone.",
      "They asked too many questions at once.",
      "They didn't say please."
    ],
    correct: 1,
    explain: "Generic output usually means generic input. 'You are a Senior Operations Manager writing to the Director (Operations). Tone: respectful, professional, slightly urgent…' transforms the same task. Role and Context do most of the heavy lifting in a prompt."
  },
  {
    q: "Which of these is a PROCUREMENT-specific prompting risk you must guard against?",
    options: [
      "AI writing too formally.",
      "Accidentally pasting live BAFO bid prices, vendor evaluations, or technical-commercial scores — even anonymised, the combination of context can fingerprint a deal.",
      "AI taking too long.",
      "Spelling mistakes."
    ],
    correct: 1,
    explain: "Procurement data is firmly Red List. The combination of clauses, vendor profiles, and your context can fingerprint a deal even if individual data points are anonymised. Use Microsoft Copilot (in-tenant) where possible; for public AI, anonymise aggressively or don't use it."
  },
  {
    q: "You want AI to apply the 5-Whys framework to an incident. Which instruction is MOST useful to include?",
    options: [
      "Just give me the root cause.",
      "Each 'Why' must logically follow from the previous answer; do not skip to root cause prematurely; after the 5th Why, state whether you've reached a true root cause or whether more investigation is needed.",
      "Use poetry.",
      "Skip the methodology and just guess."
    ],
    correct: 1,
    explain: "Frameworks need structural discipline in the prompt. Without it, AI tends to jump to a satisfying-sounding root cause too quickly. The explicit instruction to follow logical succession plus a confidence/uncertainty check at the end gives you a usable analysis."
  },
  {
    q: "You're prompting an engineering calculation sanity-check. What is the realistic boundary of what AI can do?",
    options: [
      "AI is now a fully qualified engineer — trust it completely.",
      "AI can sanity-check the APPROACH, do order-of-magnitude estimates, and identify common mistakes; it is often unreliable for exact numeric calculations. Use AI for the method, calculator/software for the numbers.",
      "AI is useless for engineering work.",
      "AI is only good for HSE."
    ],
    correct: 1,
    explain: "This is the single most important calibration for engineering use. AI is excellent at structured reasoning, order-of-magnitude checks, and catching conceptual errors. It is unreliable for exact numeric calculations because it doesn't 'calculate' — it predicts text. Use it for thinking, not for the final spreadsheet."
  },
  {
    q: "You add this paragraph at the END of your prompt: 'Do not invent any names, dates, quantities, regulations, or facts not in my input. Use [PLACEHOLDERS] for missing data. Mark uncertain claims with verify reference.' What is this called?",
    options: [
      "A friendly closer.",
      "A universal anti-hallucination block — and it should be part of any prompt where accuracy matters.",
      "A waste of words.",
      "A legal disclaimer."
    ],
    correct: 1,
    explain: "The universal anti-hallucination block is the most powerful guard against fabrication. Paste it at the end of any prompt that will produce a document for filing, sharing, or audit. It costs nothing and saves you from invented citations."
  },
  {
    q: "Which is the BETTER way to ask for output length?",
    options: [
      "Make it long.",
      "Keep it brief.",
      "Under 250 words; British English; markdown with one heading and 5-7 numbered bullets; no preamble or sign-off.",
      "Whatever you think."
    ],
    correct: 2,
    explain: "Specific, measurable format constraints (exact word count, language, structure, what to avoid) produce predictable output. Vague constraints ('brief', 'short') produce variable output. The more specific the Format and Limits, the less editing you'll do after."
  },
  {
    q: "A 'meta-prompt' or 'prompt of prompts' is a paragraph you paste at the START of a session to set defaults. Why is this powerful?",
    options: [
      "It impresses the AI.",
      "Once set, the AI follows those defaults for the rest of the conversation — British English, no emojis, [PLACEHOLDERS] not invented data, verification flags on uncertain claims. Saves time on every subsequent prompt.",
      "It costs less money.",
      "It makes the AI faster."
    ],
    correct: 1,
    explain: "Meta-prompts are one of the most efficient productivity moves. Set your style/safety defaults once at the start of a session, then every subsequent prompt inherits them. Saves typing, ensures consistency, and reduces the chance of forgetting an anti-hallucination clause."
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
const quizEl = document.getElementById('quiz');
const barEl = document.getElementById('bar');
const resultsEl = document.getElementById('results');

function render() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  const selected = answers[current];
  const answered = selected !== null;
  quizEl.innerHTML = `
    <div class="question active">
      <div class="q-meta">Question ${current + 1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.code ? `<div class="q-code">${q.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : ''}
      <ul class="options">
        ${q.options.map((opt, i) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (i === q.correct) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          } else if (selected === i) cls += ' selected';
          return `<li class="${cls}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${opt}</li>`;
        }).join('')}
      </ul>
      ${answered ? `
        <div class="feedback ${selected === q.correct ? 'correct' : 'wrong'} show">
          <strong>${selected === q.correct ? '✓ Correct' : '✗ Not quite'}</strong>
          ${q.explain}
        </div>` : ''}
      <div class="nav">
        <button class="secondary" onclick="prev()" ${current === 0 ? 'disabled' : ''}>← Previous</button>
        <button onclick="next()" ${!answered ? 'disabled' : ''}>${current === questions.length - 1 ? 'See Results →' : 'Next →'}</button>
      </div>
    </div>`;
  barEl.style.width = ((current + (answered ? 1 : 0)) / questions.length * 100) + '%';
}

function pick(i) { if (answers[current] !== null) return; answers[current] = i; render(); }
function next() { if (answers[current] === null) return; current++; if (current >= questions.length) showResults(); else render(); }
function prev() { if (current > 0) { current--; render(); } }

function showResults() {
  quizEl.style.display = 'none';
  resultsEl.classList.add('show');
  const score = answers.filter((a, i) => a === questions[i].correct).length;
  const pct = Math.round(score / questions.length * 100);
  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('scoreFrac').textContent = score + ' / ' + questions.length;
  let verdict;
  if (pct === 100) verdict = "Perfect — your prompts will produce professional output on the first try.";
  else if (pct >= 80) verdict = "Strong — you have a real instinct for prompt engineering.";
  else if (pct >= 60) verdict = "Good — read the prompt library and try the master-prompt activity again.";
  else verdict = "Re-read Module 03 carefully; prompt quality is the highest-leverage skill of the day.";
  document.getElementById('verdictText').textContent = verdict;
  const reviewHTML = questions.map((q, i) => {
    const ok = answers[i] === q.correct;
    return `<div class="review-item">
      <span class="review-mark">${ok ? '✓' : '✗'}</span>
      <div><strong>Q${i+1}.</strong> ${q.q.substring(0, 90)}${q.q.length > 90 ? '…' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('reviewList').innerHTML = reviewHTML;
  barEl.style.width = '100%';
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  quizEl.style.display = 'block';
  resultsEl.classList.remove('show');
  render();
}

render();
</script>
</body>
</html>
